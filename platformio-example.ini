; PlatformIO Project Configuration File
;
; ******* DON'T EDIT THIS FILE! ********
; ***** Copy it to platformio.ini and edit that! *****
;
; Also copy duogeiger/userdefines-example.h to duogeiger/userdefines.h
; and adjust the settings there.

[platformio]
src_dir = duogeiger

[env:geiger]
board = heltec_wifi_lora_32_V2
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
  U8g2
  Adafruit BME680 Library@^2.0.0
  Adafruit BME280 Library
  Adafruit Unified Sensor
  IotWebConf@^3.1.0
  knolleary/PubSubClient@^2.8
  witnessmenow/Universal-Arduino-Telegram-Bot@^1.3.0
  h2zero/NimBLE-Arduino
